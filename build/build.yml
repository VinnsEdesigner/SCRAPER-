name: Build Bookmarklet

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build bookmarklet
        run: npm run build

      - name: Commit bookmarklet
        run: |
          git config user.email "kamaukevin0033@gmail.com"
          git config user.name "VinnsEdesigner"
          git add build/bookmarklet.min.js
          git diff --staged --quiet || git commit -m "build: update bookmarklet [skip ci]"
          git push origin main
