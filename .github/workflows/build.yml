name: Build Scraper

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build scraper bundle
        env:
          BACKEND_URL: https://backe-nd.onrender.com
        run: npm run build

      - name: Commit build output
        run: |
          git config user.email "kamaukevin0033@gmail.com"
          git config user.name "VinnsEdesigner"
          git add build/scraper.js build/loader.txt
          git diff --staged --quiet || git commit -m "build: update scraper bundle [skip ci]"
          git push origin main
